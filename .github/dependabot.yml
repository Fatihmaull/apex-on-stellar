version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      soroban:
        patterns: ["soroban*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      stellar:
        patterns: ["@stellar/*", "@creit.tech/*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
