name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract (fmt · clippy · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy -p apex-futures --all-targets -- -D warnings

      - name: Unit + property tests
        run: cargo test -p apex-futures

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --version ^22 || cargo install --locked stellar-cli

      - name: Build optimized WASM
        run: |
          stellar contract build
          ls -lh target/wasm32v1-none/release/apex_futures.wasm

  frontend:
    name: Frontend (typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
        env:
          # Build must succeed without live values; the app degrades gracefully.
          NEXT_PUBLIC_NETWORK: TESTNET
